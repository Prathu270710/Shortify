version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: urlshortener_db
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: urlshortener_cache
    ports:
      - "6379:6379"

volumes:
  postgres_data: